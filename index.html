<!DOCTYPE html>
<html>
<head>

<title>AI Crypto Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b1d3a;
color:white;
font-family:Arial;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#08142b;
}

#coinInfo{
display:flex;
align-items:center;
gap:10px;
}

#coinLogo{
width:32px;
}

#coinSelect{
padding:6px;
font-size:16px;
}

#chart{
width:100%;
height:60vh;
}

#panel{
padding:20px;
}

.box{
background:#132c57;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.meter{
height:12px;
background:#333;
border-radius:6px;
overflow:hidden;
}

#powerBar{
height:100%;
background:lime;
width:50%;
}

#tradeResult{
font-size:28px;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<div id="coinInfo">
<img id="coinLogo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
<h2 id="coinName">BTC/USDT</h2>
</div>

<select id="coinSelect">

<option value="BTCUSDT" data-logo="https://cryptologos.cc/logos/bitcoin-btc-logo.png">BTC</option>
<option value="ETHUSDT" data-logo="https://cryptologos.cc/logos/ethereum-eth-logo.png">ETH</option>
<option value="SOLUSDT" data-logo="https://cryptologos.cc/logos/solana-sol-logo.png">SOL</option>
<option value="BNBUSDT" data-logo="https://cryptologos.cc/logos/bnb-bnb-logo.png">BNB</option>

</select>

</header>

<div id="chart"></div>

<div id="panel">

<div class="box">

<h3>AI Trade</h3>

Entry: <span id="entry">-</span><br>
TP: <span id="tp">-</span><br>
SL: <span id="sl">-</span>

<div id="tradeResult"></div>

</div>

<div class="box">

<h3>Win Rate</h3>

<span id="wins">0</span> Wins /
<span id="losses">0</span> Losses

</div>

<div class="box">

<h3>Buyer / Seller Power</h3>

<div class="meter">
<div id="powerBar"></div>
</div>

<p id="powerText"></p>

</div>

<div class="box">

<h3>Price Action Analysis</h3>

<p id="analysis">Waiting for data...</p>

</div>

<div class="box">

<h3>Pattern Detection</h3>

<p id="pattern">Scanning market...</p>

</div>

</div>

<audio id="coinSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

let currentSymbol="BTCUSDT"
let wins=0
let losses=0
let entry,tp,sl

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",

autosize:true,

symbol:"BINANCE:"+symbol,

interval:"5",

theme:"dark",

style:"1",

toolbar_bg:"#0b1d3a",

allow_symbol_change:true,

hide_side_toolbar:false,

hide_top_toolbar:false

})

}

loadChart(currentSymbol)

document.getElementById("coinSelect").addEventListener("change",function(){

let symbol=this.value
let logo=this.options[this.selectedIndex].dataset.logo

document.getElementById("coinLogo").src=logo
document.getElementById("coinName").innerText=symbol.replace("USDT","/USDT")

document.getElementById("coinSound").play()

currentSymbol=symbol

loadChart(symbol)

generateTrade()

})

function randomPrice(){

return 20000+Math.random()*5000

}

function generateTrade(){

let price=randomPrice()

entry=price.toFixed(2)

tp=(price+100).toFixed(2)

sl=(price-100).toFixed(2)

document.getElementById("entry").innerText=entry
document.getElementById("tp").innerText=tp
document.getElementById("sl").innerText=sl

document.getElementById("tradeResult").innerText=""

setTimeout(checkTrade,7000)

}

function checkTrade(){

let result=Math.random()

if(result>0.5){

wins++

document.getElementById("tradeResult").innerText="👍 TP HIT"

}else{

losses++

document.getElementById("tradeResult").innerText="❌ SL HIT"

}

document.getElementById("wins").innerText=wins
document.getElementById("losses").innerText=losses

setTimeout(generateTrade,4000)

}

function updatePower(){

let buyer=Math.random()*100

let seller=100-buyer

document.getElementById("powerBar").style.width=buyer+"%"

if(buyer>seller){

document.getElementById("powerText").innerText="Buyers Control Market"

}else{

document.getElementById("powerText").innerText="Sellers Control Market"

}

}

function updateAnalysis(){

let texts=[

"Price testing resistance multiple times on 5m timeframe",

"Market forming higher highs bullish structure",

"Liquidity sweep likely near support",

"Range consolidation before breakout",

"Trend continuation expected"

]

document.getElementById("analysis").innerText=texts[Math.floor(Math.random()*texts.length)]

}

function detectPattern(){

let patterns=[

"Triangle forming",

"Bull Flag pattern",

"Rising wedge",

"No clear pattern",

"Breakout structure forming"

]

document.getElementById("pattern").innerText=patterns[Math.floor(Math.random()*patterns.length)]

}

generateTrade()

setInterval(updatePower,6000)

setInterval(updateAnalysis,7000)

setInterval(detectPattern,8000)

</script>

</body>
  </html>
