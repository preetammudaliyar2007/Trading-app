<!DOCTYPE html>
<html>

<head>

<title>AI Crypto Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1d3a;
color:white;
}

#loginPage{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

input{
padding:10px;
margin:10px;
border:none;
border-radius:6px;
}

button{
padding:10px 20px;
background:#1f6fff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#dashboard{
display:none;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#08142b;
}

#coinInfo{
display:flex;
align-items:center;
gap:10px;
}

#coinLogo{
width:32px;
}

#coinSelect{
padding:8px;
background:#1f6fff;
color:white;
border:none;
border-radius:6px;
}

#chart{
width:100%;
height:60vh;
}

/* SAVE BUTTON */

#saveLayout{
display:block;
margin:10px auto;
padding:12px 25px;
background:#00ff88;
color:black;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
}

#panel{
padding:20px;
}

.box{
background:#122b55;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<h2>Login to Trading Dashboard</h2>

<input id="username" placeholder="Enter username">

<button onclick="login()">Enter</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<header>

<div id="coinInfo">

<img id="coinLogo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">

<h2 id="coinName">BTC/USDT</h2>

</div>

<select id="coinSelect">

<option value="BTCUSDT" data-logo="https://cryptologos.cc/logos/bitcoin-btc-logo.png">BTC</option>

<option value="ETHUSDT" data-logo="https://cryptologos.cc/logos/ethereum-eth-logo.png">ETH</option>

<option value="SOLUSDT" data-logo="https://cryptologos.cc/logos/solana-sol-logo.png">SOL</option>

</select>

</header>

<div id="chart"></div>

<button id="saveLayout" onclick="saveChart()">SAVE MY CHART</button>

<div id="panel">

<div class="box">

<h3>AI Trade</h3>

Entry: <span id="entry">-</span><br>
TP: <span id="tp">-</span><br>
SL: <span id="sl">-</span>

</div>

<div class="box">

<h3>Market Analysis</h3>

<p id="analysis">Waiting for analysis...</p>

</div>

</div>

</div>

<audio id="coinSound">

<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">

</audio>

<script>

let symbol="BTCUSDT"
let user=""
let widget

/* LOGIN */

function login(){

user=document.getElementById("username").value

if(user==""){

alert("Enter username")

return

}

localStorage.setItem("dashboard_user",user)

startDashboard()

}

function startDashboard(){

user=localStorage.getItem("dashboard_user")

document.getElementById("loginPage").style.display="none"

document.getElementById("dashboard").style.display="block"

loadChart(symbol)

generateTrade()

}

if(localStorage.getItem("dashboard_user")){

startDashboard()

}

/* LOAD CHART */

function loadChart(sym){

document.getElementById("chart").innerHTML=""

widget = new TradingView.widget({

container_id:"chart",

autosize:true,

symbol:"BINANCE:"+sym,

interval:"5",

timezone:"Etc/UTC",

theme:"dark",

style:"1",

locale:"en",

toolbar_bg:"#0b1d3a",

allow_symbol_change:true,

hide_side_toolbar:false,

hide_top_toolbar:false,

withdateranges:true,

details:true,

hotlist:true,

calendar:true,

charts_storage_url:"https://saveload.tradingview.com",

charts_storage_api_version:"1.1",

client_id:"crypto_ai_dashboard",

user_id:user,

load_last_chart:true

})

}

/* SAVE BUTTON */

function saveChart(){

alert("Use the 💾 icon inside the chart toolbar to save your drawing layout.")

}

/* COIN CHANGE */

document.getElementById("coinSelect").addEventListener("change",function(){

symbol=this.value

let logo=this.options[this.selectedIndex].dataset.logo

document.getElementById("coinLogo").src=logo

document.getElementById("coinName").innerText=symbol.replace("USDT","/USDT")

document.getElementById("coinSound").play()

loadChart(symbol)

generateTrade()

})

/* AI TRADE */

async function generateTrade(){

let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=5m&limit=50`)

let candles=await res.json()

let closes=candles.map(c=>parseFloat(c[4]))
let highs=candles.map(c=>parseFloat(c[2]))
let lows=candles.map(c=>parseFloat(c[3]))

let price=closes[closes.length-1]

let support=Math.min(...lows.slice(-15))
let resistance=Math.max(...highs.slice(-15))

let direction="LONG"

if(price>(support+resistance)/2){

direction="SHORT"

}

let tpDistance=300+Math.random()*200
let slDistance=200

let entry=price

let tp
let sl

if(direction=="LONG"){

tp=entry+tpDistance
sl=entry-slDistance

}else{

tp=entry-tpDistance
sl=entry+slDistance

}

document.getElementById("entry").innerText=entry.toFixed(2)
document.getElementById("tp").innerText=tp.toFixed(2)
document.getElementById("sl").innerText=sl.toFixed(2)

document.getElementById("analysis").innerText=
`${symbol.replace("USDT","")} Market Analysis:

Support: ${support.toFixed(2)}

Resistance: ${resistance.toFixed(2)}

Scalping opportunity detected near market price.

Suggested direction: ${direction}`

}

setInterval(generateTrade,25000)

</script>

</body>

</html>
