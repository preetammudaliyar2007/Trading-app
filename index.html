<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Crypto Smart Platform</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1d3a;
color:white;
}

/* HEADER */

header{
background:black;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

select,button{
background:black;
color:#39ff14;
border:1px solid #39ff14;
padding:6px;
}

/* CHART SIZE FIX */

.chart-container{
width:100%;
height:60vh;
}

/* ANALYSIS */

.analysis{
padding:12px;
}

.panel{
background:#061428;
border:1px solid #39ff14;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.title{
color:#39ff14;
font-weight:bold;
margin-bottom:5px;
}

/* BUY SELL BAR */

.bar{
height:20px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.buy{
background:#39ff14;
height:100%;
}

.sell{
background:red;
height:100%;
}

/* RESULT POPUP */

.resultPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
animation:pop 1s ease;
z-index:999;
}

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0)}
50%{transform:translate(-50%,-50%) scale(1.4)}
100%{transform:translate(-50%,-50%) scale(1)}
}

footer{
text-align:center;
padding:10px;
background:black;
color:#39ff14;
font-size:12px;
}

</style>

</head>


<body>


<header>

<select id="coin" onchange="loadCoin()">

<option value="BINANCE:BTCUSDT">BTC</option>
<option value="BINANCE:ETHUSDT">ETH</option>
<option value="BINANCE:SOLUSDT">SOL</option>
<option value="BINANCE:XRPUSDT">XRP</option>
<option value="BINANCE:ADAUSDT">ADA</option>

</select>

<button onclick="chartOnly()">Chart Only</button>

</header>



<div class="chart-container">
<div id="chart" style="width:100%;height:100%"></div>
</div>



<div class="analysis" id="analysis">

<div class="panel">
<div class="title">AI Trade</div>

Entry: <span id="entry">Waiting...</span><br>
TP: <span id="tp">-</span><br>
SL: <span id="sl">-</span>

</div>


<div class="panel">
<div class="title">Win Rate</div>

<span id="winrate">0%</span>

</div>


<div class="panel">
<div class="title">Buyer vs Seller Power</div>

Buyer
<div class="bar">
<div id="buybar" class="buy"></div>
</div>

Seller
<div class="bar">
<div id="sellbar" class="sell"></div>
</div>

</div>

</div>



<footer>
Powered by Preetam Mudaliyar 
</footer>



<script>

let symbol="BTCUSDT"

/* LOAD CHART */

function loadCoin(){

let coin=document.getElementById("coin").value

symbol = coin.replace("BINANCE:","")

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",
autosize:true,
symbol:coin,
interval:"15",
theme:"dark",
style:"1",
toolbar_bg:"#0b1d3a",
enable_publishing:false,
allow_symbol_change:true,
hide_side_toolbar:false

})

startTrade()

}

loadCoin()


/* GET REAL MARKET PRICE */

async function getPrice(){

try{

let r = await fetch(
"https://api.binance.com/api/v3/ticker/price?symbol="+symbol
)

let d = await r.json()

return parseFloat(d.price)

}catch{

return null

}

}


/* AI TRADE SYSTEM */

let wins=0
let total=0

let entry=0
let tp=0
let sl=0
let price=0
let tradeActive=false


async function startTrade(){

let current = await getPrice()

if(current===null){

document.getElementById("entry").innerText="Waiting..."
return

}

entry=Math.round(current)

let moveTP = Math.floor(Math.random()*100)+100
let moveSL = Math.floor(Math.random()*100)+100

tp = entry + moveTP
sl = entry - moveSL

price = entry

document.getElementById("entry").innerText=entry
document.getElementById("tp").innerText=tp
document.getElementById("sl").innerText=sl

tradeActive=true

}


/* MONITOR PRICE */

async function simulateMarket(){

if(!tradeActive) return

let current = await getPrice()

if(current===null) return

price=current


if(price>=tp){

showResult("❤️")

wins++
total++

updateWinRate()

tradeActive=false

setTimeout(startTrade,4000)

}

else if(price<=sl){

showResult("🦴")

total++

updateWinRate()

tradeActive=false

setTimeout(startTrade,4000)

}

}

setInterval(simulateMarket,3000)


/* RESULT POPUP */

function showResult(icon){

let pop=document.createElement("div")

pop.className="resultPopup"

pop.innerHTML=icon

document.body.appendChild(pop)

setTimeout(()=>pop.remove(),1200)

}


/* WIN RATE */

function updateWinRate(){

let rate=((wins/total)*100).toFixed(1)

document.getElementById("winrate").innerText=rate+"%"

}


/* BUY SELL POWER */

async function updateMarketPower(){

try{

let r = await fetch(
"https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval=15m&limit=20"
)

let d = await r.json()

let first=parseFloat(d[0][4])
let last=parseFloat(d[d.length-1][4])

let buyPower
let sellPower

if(last>first){

buyPower=70+Math.floor(Math.random()*15)
sellPower=100-buyPower

}else{

sellPower=70+Math.floor(Math.random()*15)
buyPower=100-sellPower

}

document.getElementById("buybar").style.width=buyPower+"%"
document.getElementById("sellbar").style.width=sellPower+"%"

}catch{}

}

setInterval(updateMarketPower,30000)

updateMarketPower()


/* CHART ONLY MODE */

function chartOnly(){

let a=document.getElementById("analysis")

if(a.style.display==="none"){

a.style.display="block"

}else{

a.style.display="none"

}

}

</script>


</body>
                                     </html>
