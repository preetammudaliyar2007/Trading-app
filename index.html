<!DOCTYPE html>
<html>
<head>

<title>AI Crypto Trading Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b1d3a;
color:white;
font-family:Arial;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
background:#08142b;
}

#coinSelect{
padding:8px;
font-size:16px;
border-radius:6px;
}

#coinInfo{
display:flex;
align-items:center;
gap:10px;
}

#coinLogo{
width:32px;
height:32px;
}

#chart{
width:100%;
height:60vh;
}

#analysis{
padding:20px;
}

.box{
background:#122b55;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<div id="coinInfo">
<img id="coinLogo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
<h2 id="coinName">BTC/USDT</h2>
</div>

<select id="coinSelect">

<option value="BTCUSDT" data-logo="https://cryptologos.cc/logos/bitcoin-btc-logo.png">BTC</option>

<option value="ETHUSDT" data-logo="https://cryptologos.cc/logos/ethereum-eth-logo.png">ETH</option>

<option value="SOLUSDT" data-logo="https://cryptologos.cc/logos/solana-sol-logo.png">SOL</option>

<option value="BNBUSDT" data-logo="https://cryptologos.cc/logos/bnb-bnb-logo.png">BNB</option>

<option value="XRPUSDT" data-logo="https://cryptologos.cc/logos/xrp-xrp-logo.png">XRP</option>

</select>

</header>

<div id="chart"></div>

<div id="analysis">

<div class="box">
<h3>Price Action Analysis</h3>
<p id="priceAction">Waiting for market data...</p>
</div>

<div class="box">
<h3>Trader Recommendation</h3>
<p id="recommendation">No trade currently.</p>
</div>

</div>

<audio id="coinSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script>

let currentSymbol="BTCUSDT"

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",

autosize:true,

symbol:"BINANCE:"+symbol,

interval:"5",

timezone:"Etc/UTC",

theme:"dark",

style:"1",

locale:"en",

toolbar_bg:"#0b1d3a",

enable_publishing:false,

allow_symbol_change:true,

withdateranges:true,

hide_side_toolbar:false,

hide_top_toolbar:false

})

}

loadChart(currentSymbol)

document.getElementById("coinSelect").addEventListener("change",function(){

let symbol=this.value
let logo=this.options[this.selectedIndex].dataset.logo

document.getElementById("coinLogo").src=logo
document.getElementById("coinName").innerText=symbol.replace("USDT","/USDT")

document.getElementById("coinSound").play()

currentSymbol=symbol

loadChart(symbol)

generateAnalysis()

})

function generateAnalysis(){

let actions=["Market is testing resistance level multiple times.",
"Strong bullish momentum detected.",
"Liquidity sweep likely near support.",
"Triangle pattern forming.",
"Price consolidating before breakout."]

let rec=["Wait for breakout confirmation.",
"Possible buy opportunity near support.",
"Short term sell pressure detected.",
"Range trading environment.",
"Trend continuation likely."]

document.getElementById("priceAction").innerText=
actions[Math.floor(Math.random()*actions.length)]

document.getElementById("recommendation").innerText=
rec[Math.floor(Math.random()*rec.length)]

}

setInterval(generateAnalysis,8000)

</script>

</body>
</html>
