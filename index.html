<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Trading Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b1d3a;
color:white;
font-family:Arial;
}

/* HEADER */

header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
background:#08142a;
}

/* CHART */

.chartBox{
width:100%;
height:65vh;
}

#chart{
width:100%;
height:100%;
}

/* INFO SECTION */

.info{
padding:15px;
}

.box{
background:#112a52;
padding:12px;
margin-bottom:12px;
border-radius:8px;
}

.power{
display:flex;
height:18px;
background:#333;
border-radius:6px;
overflow:hidden;
}

.buy{
background:#00ff88;
height:100%;
}

.sell{
background:#ff3b3b;
height:100%;
}

.tp{
color:#00ff88;
font-size:20px;
}

.sl{
color:#ff3b3b;
font-size:20px;
}

/* LANDSCAPE MODE */

@media (orientation: landscape){

header{
display:none;
}

.chartBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:1000;
}

.info{
display:none;
}

}

</style>

</head>

<body>

<header>AI Crypto Trading Dashboard</header>

<div class="chartBox">
<div id="chart"></div>
</div>

<div class="info">

<div class="box">
<h3>AI Trade</h3>
<div id="trade">Waiting trade...</div>
</div>

<div class="box">
<h3>Winning Rate</h3>
<div id="winrate">0%</div>
</div>

<div class="box">
<h3>Buyer / Seller Power</h3>

<div class="power">
<div id="buy" class="buy"></div>
<div id="sell" class="sell"></div>
</div>

</div>

<div class="box">
<h3>Support / Resistance</h3>
<div id="levels"></div>
</div>

<div class="box">
<h3>Pattern</h3>
<div id="pattern"></div>
</div>

<div class="box">
<h3>Price Action Analysis</h3>
<div id="analysis"></div>
</div>

<div class="box">
<h3>Trader Recommendation</h3>
<div id="recommend"></div>
</div>

</div>

<script>

/* LOAD TRADINGVIEW CANDLESTICK CHART */

function loadChart(){

document.getElementById("chart").innerHTML="";

new TradingView.widget({

container_id:"chart",

autosize:true,

symbol:"BINANCE:BTCUSDT",

interval:"5",

theme:"dark",

style:"1",

locale:"en",

toolbar_bg:"#0b1d3a",

enable_publishing:false,

hide_side_toolbar:false

})

}

loadChart()

/* RELOAD CHART WHEN SCREEN ROTATES */

window.addEventListener("orientationchange",function(){

setTimeout(loadChart,500)

})

let wins=0
let losses=0
let trade=null

async function getPrice(){

let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT")

let d=await r.json()

return parseFloat(d.price)

}

function buyerSeller(){

let buyPower=65
let sellPower=35

document.getElementById("buy").style.width=buyPower+"%"
document.getElementById("sell").style.width=sellPower+"%"

}

function supportResistance(price){

let support=(price-150).toFixed(2)
let resistance=(price+150).toFixed(2)

document.getElementById("levels").innerText =
"Support: "+support+" | Resistance: "+resistance

}

function pattern(){

let list=[
"Triangle forming",
"Bullish flag",
"Bearish flag",
"Range market"
]

document.getElementById("pattern").innerText =
list[Math.floor(Math.random()*list.length)]

}

function analysis(){

let text=Math.random()>0.5
? "Buyers controlling structure."
: "Sellers dominating near resistance."

document.getElementById("analysis").innerText=text

}

function recommendation(){

let text=Math.random()>0.5
? "Recommended BUY — momentum building."
: "Recommended SELL — resistance rejection possible."

document.getElementById("recommend").innerText=text

}

async function generateTrade(){

if(trade) return

let price=await getPrice()

let direction=Math.random()>0.5?"BUY":"SELL"

let entry=price

let tp=direction==="BUY"?entry+120:entry-120
let sl=direction==="BUY"?entry-120:entry+120

trade={direction,tp,sl}

document.getElementById("trade").innerHTML=

direction+
"<br>Entry: "+entry.toFixed(2)+
"<br>TP: "+tp.toFixed(2)+
"<br>SL: "+sl.toFixed(2)

supportResistance(price)

}

async function checkTrade(){

if(!trade) return

let price=await getPrice()

if(trade.direction==="BUY"){

if(price>=trade.tp){
wins++
finish("tp")
}

if(price<=trade.sl){
losses++
finish("sl")
}

}

if(trade.direction==="SELL"){

if(price<=trade.tp){
wins++
finish("tp")
}

if(price>=trade.sl){
losses++
finish("sl")
}

}

}

function finish(type){

if(type==="tp"){

document.getElementById("trade").innerHTML +=
"<div class='tp'>TP DONE 👍</div>"

}

if(type==="sl"){

document.getElementById("trade").innerHTML +=
"<div class='sl'>SL 🦴</div>"

}

trade=null

let total=wins+losses

let rate=((wins/total)*100).toFixed(1)

document.getElementById("winrate").innerText=rate+"%"

setTimeout(generateTrade,5000)

}

setInterval(buyerSeller,8000)
setInterval(pattern,12000)
setInterval(recommendation,15000)

setInterval(generateTrade,10000)
setInterval(checkTrade,4000)

</script>

</body>
</html>
