<!DOCTYPE html>
<html>
<head>

<title>AI Crypto Scalping Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b1d3a;
color:white;
font-family:Arial;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#08142b;
}

#coinInfo{
display:flex;
align-items:center;
gap:10px;
}

#coinLogo{
width:32px;
height:32px;
}

#coinSelect{
padding:8px;
background:#1b3c70;
color:white;
border:none;
border-radius:6px;
}

#chart{
width:100%;
height:60vh;
}

#panel{
padding:20px;
}

.box{
background:#132c57;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<div id="coinInfo">
<img id="coinLogo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
<h2 id="coinName">BTC/USDT</h2>
</div>

<select id="coinSelect">

<option value="BTCUSDT" data-logo="https://cryptologos.cc/logos/bitcoin-btc-logo.png">BTC</option>

<option value="ETHUSDT" data-logo="https://cryptologos.cc/logos/ethereum-eth-logo.png">ETH</option>

<option value="SOLUSDT" data-logo="https://cryptologos.cc/logos/solana-sol-logo.png">SOL</option>

<option value="BNBUSDT" data-logo="https://cryptologos.cc/logos/bnb-bnb-logo.png">BNB</option>

</select>

</header>

<div id="chart"></div>

<div id="panel">

<div class="box">

<h3>AI Scalping Trade</h3>

Entry: <span id="entry">-</span><br>
TP: <span id="tp">-</span><br>
SL: <span id="sl">-</span><br>
Direction: <span id="direction">-</span>

</div>

<div class="box">

<h3>Market Analysis</h3>

<p id="analysis">Loading analysis...</p>

</div>

</div>

<script>

let symbol="BTCUSDT"

function loadChart(sym){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",

autosize:true,

symbol:"BINANCE:"+sym,

interval:"5",

theme:"dark",

style:"1",

toolbar_bg:"#0b1d3a",

allow_symbol_change:true

})

}

loadChart(symbol)

document.getElementById("coinSelect").addEventListener("change",function(){

symbol=this.value

let logo=this.options[this.selectedIndex].dataset.logo

document.getElementById("coinLogo").src=logo
document.getElementById("coinName").innerText=symbol.replace("USDT","/USDT")

loadChart(symbol)

generateTrade()

})

async function getPrice(){

let res=await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`)
let data=await res.json()

return parseFloat(data.price)

}

async function generateTrade(){

let price=await getPrice()

let direction=Math.random()>0.5?"LONG":"SHORT"

let tpDistance=300+Math.random()*200
let slDistance=200

let entry=price

let tp,sl

if(direction=="LONG"){

tp=price+tpDistance
sl=price-slDistance

}else{

tp=price-tpDistance
sl=price+slDistance

}

document.getElementById("entry").innerText=entry.toFixed(2)
document.getElementById("tp").innerText=tp.toFixed(2)
document.getElementById("sl").innerText=sl.toFixed(2)
document.getElementById("direction").innerText=direction

generateAnalysis(direction)

}

function generateAnalysis(direction){

let text

if(direction=="LONG"){

text="Bullish structure detected. EMA trend support holding. Possible breakout continuation for scalping opportunity."

}else{

text="Bearish pressure visible. Liquidity sweep above resistance possible. Short scalp opportunity."

}

document.getElementById("analysis").innerText=text

}

generateTrade()

setInterval(generateTrade,20000)

</script>

</body>
</html>
