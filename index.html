<!DOCTYPE html>
<html>
<head>
<title>Trading Dashboard</title>

<style>
body{
background:#0d1117;
color:white;
font-family:Arial;
text-align:center;
}

.header{
background:#161b22;
padding:15px;
font-size:24px;
font-weight:bold;
}

.signal{
background:#00ff88;
color:black;
padding:10px;
font-size:18px;
font-weight:bold;
margin:10px;
}

.sell{
background:#ff4444;
}

.liquidity{
background:#161b22;
border:2px solid red;
padding:10px;
margin-top:10px;
}

.zone{
color:orange;
font-size:18px;
}

</style>
</head>

<body>

<div class="header">
BTC Trading Dashboard
</div>

<div class="signal">
TREND SIGNAL : STRONG BUY 🚀
</div>

<!-- TradingView Chart -->
<div class="tradingview-widget-container">
<div id="tradingview_chart"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
width: "100%",
height: 500,
symbol: "BINANCE:BTCUSDT",
interval: "15",
timezone: "Etc/UTC",
theme: "dark",
style: "1",
locale: "en",
toolbar_bg: "#f1f3f6",
enable_publishing: false,
hide_side_toolbar: false,
allow_symbol_change: true,
container_id: "tradingview_chart",
studies: [
"RSI@tv-basicstudies",
"MACD@tv-basicstudies"
]
});
</script>

</div>

<div class="liquidity">
Best Liquidity Zone
<br>
<span class="zone">$63,000 - $63,400</span>
</div>

</body>
</html>
