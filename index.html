<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Crypto Analyzer</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#081b33;
font-family:Arial;
color:white;
overflow:hidden;
}

header{
height:40px;
background:#051426;
display:flex;
align-items:center;
justify-content:space-between;
padding:5px 10px;
}

#chart{
width:100%;
}

/* PANELS */

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
padding:6px;
}

.box{
background:#061a31;
padding:6px;
border-radius:5px;
font-size:12px;
}

h3{
margin:3px 0;
font-size:13px;
color:#00ff9c;
}

.barBox{
display:flex;
height:12px;
background:#222;
border-radius:3px;
overflow:hidden;
}

#buybar{
background:#00ff9c;
width:50%;
}

#sellbar{
background:#ff4040;
width:50%;
}

</style>
</head>

<body>

<header>

<select id="coinSelect">
<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="SOLUSDT">SOL</option>
</select>

<div>AI Crypto Analyzer</div>

</header>

<div id="chart"></div>

<div class="panel">

<div class="box">
<h3>AI Trade</h3>
Entry: <span id="entry"></span><br>
TP: <span id="tp"></span><br>
SL: <span id="sl"></span>
</div>

<div class="box">
<h3>Demand / Supply</h3>
Demand: <span id="demand"></span><br>
Supply: <span id="supply"></span>
</div>

<div class="box">
<h3>Buyer / Seller Power</h3>
<div class="barBox">
<div id="buybar"></div>
<div id="sellbar"></div>
</div>
</div>

<div class="box">
<h3>Pattern</h3>
<div id="pattern">Scanning...</div>
</div>

</div>

<script>

let symbol="BTCUSDT"

/* FORCE 60% CHART HEIGHT */

function setChartHeight(){

let screenHeight=window.innerHeight
let chartHeight=screenHeight*0.60

document.getElementById("chart").style.height=
chartHeight+"px"

}

/* LOAD CHART */

function loadChart(){

setChartHeight()

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",

width:"100%",

height:"100%",

symbol:"BINANCE:"+symbol,

interval:"5",

theme:"dark",

style:"1",

toolbar_bg:"#081b33",

hide_side_toolbar:false,

allow_symbol_change:false

})

}

loadChart()

/* COIN CHANGE */

document.getElementById("coinSelect").onchange=function(){

symbol=this.value
loadChart()

}

/* BASIC AI TRADE */

async function getPrice(){

let r=await fetch(
"https://api.binance.com/api/v3/ticker/price?symbol="+symbol
)

let d=await r.json()
return parseFloat(d.price)

}

async function updateTrade(){

let price=await getPrice()

let move=price*0.003

document.getElementById("entry").innerText=price.toFixed(2)
document.getElementById("tp").innerText=(price+move).toFixed(2)
document.getElementById("sl").innerText=(price-move).toFixed(2)

document.getElementById("demand").innerText=(price*0.99).toFixed(2)
document.getElementById("supply").innerText=(price*1.01).toFixed(2)

}

function updatePower(){

let buy=60+Math.random()*20
let sell=100-buy

document.getElementById("buybar").style.width=buy+"%"
document.getElementById("sellbar").style.width=sell+"%"

}

setInterval(updateTrade,8000)
setInterval(updatePower,12000)

</script>

</body>
         </html>
