<!DOCTYPE html>
<html>

<head>

<title>AI Crypto Scalping Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1d3a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#08142b;
}

#coinInfo{
display:flex;
align-items:center;
gap:10px;
}

#coinLogo{
width:34px;
height:34px;
}

#coinSelect{
padding:8px;
background:#1c3f75;
color:white;
border:none;
border-radius:6px;
}

#chart{
width:100%;
height:60vh;
}

#panel{
padding:20px;
}

.box{
background:#122b55;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.powerBar{
height:12px;
background:#333;
border-radius:6px;
overflow:hidden;
}

#power{
height:100%;
background:lime;
width:50%;
}

</style>

</head>

<body>

<header>

<div id="coinInfo">
<img id="coinLogo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
<h2 id="coinName">BTC/USDT</h2>
</div>

<select id="coinSelect">

<option value="BTCUSDT" data-logo="https://cryptologos.cc/logos/bitcoin-btc-logo.png">BTC</option>
<option value="ETHUSDT" data-logo="https://cryptologos.cc/logos/ethereum-eth-logo.png">ETH</option>
<option value="SOLUSDT" data-logo="https://cryptologos.cc/logos/solana-sol-logo.png">SOL</option>
<option value="BNBUSDT" data-logo="https://cryptologos.cc/logos/bnb-bnb-logo.png">BNB</option>

</select>

</header>

<div id="chart"></div>

<div id="panel">

<div class="box">

<h3>AI Scalping Trade</h3>

Entry: <span id="entry">-</span><br>
TP: <span id="tp">-</span><br>
SL: <span id="sl">-</span><br>
Direction: <span id="direction">-</span><br>

<div id="result"></div>

</div>

<div class="box">

<h3>Win Rate</h3>

<span id="wins">0</span> Wins /
<span id="losses">0</span> Losses

</div>

<div class="box">

<h3>Buyer vs Seller Power</h3>

<div class="powerBar">
<div id="power"></div>
</div>

<p id="powerText"></p>

</div>

<div class="box">

<h3>Market Analysis</h3>

<p id="analysis"></p>

</div>

<div class="box">

<h3>Pattern Detection</h3>

<p id="pattern"></p>

</div>

</div>

<audio id="coinSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

let symbol="BTCUSDT"
let wins=0
let losses=0
let entry,tp,sl

function loadChart(sym){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",

autosize:true,

symbol:"BINANCE:"+sym,

interval:"5",

theme:"dark",

style:"1",

toolbar_bg:"#0b1d3a",

allow_symbol_change:true

})

}

loadChart(symbol)

document.getElementById("coinSelect").addEventListener("change",function(){

symbol=this.value

let logo=this.options[this.selectedIndex].dataset.logo

document.getElementById("coinLogo").src=logo
document.getElementById("coinName").innerText=symbol.replace("USDT","/USDT")

document.getElementById("coinSound").play()

loadChart(symbol)

generateTrade()

})

async function getPrice(){

let res=await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`)
let data=await res.json()

return parseFloat(data.price)

}

async function generateTrade(){

let price=await getPrice()

let direction=Math.random()>0.5?"LONG":"SHORT"

let tpDistance=300+Math.random()*200
let slDistance=200

entry=price

if(direction=="LONG"){

tp=price+tpDistance
sl=price-slDistance

}else{

tp=price-tpDistance
sl=price+slDistance

}

document.getElementById("entry").innerText=entry.toFixed(2)
document.getElementById("tp").innerText=tp.toFixed(2)
document.getElementById("sl").innerText=sl.toFixed(2)
document.getElementById("direction").innerText=direction

marketAnalysis()

setTimeout(checkTrade,15000)

}

function checkTrade(){

let r=Math.random()

if(r>0.55){

wins++
document.getElementById("result").innerText="👍 TP HIT"

}else{

losses++
document.getElementById("result").innerText="❌ SL HIT"

}

document.getElementById("wins").innerText=wins
document.getElementById("losses").innerText=losses

setTimeout(generateTrade,6000)

}

function marketAnalysis(){

let texts=[

"5m EMA trend bullish. 15m resistance breakout forming.",

"Liquidity sweep detected near support zone.",

"Possible false breakout on 15m timeframe.",

"1H trend bullish while 5m forming consolidation.",

"SMC structure showing higher highs."

]

document.getElementById("analysis").innerText=
texts[Math.floor(Math.random()*texts.length)]

patternDetect()

updatePower()

}

function patternDetect(){

let p=[

"Triangle pattern forming",

"Bull flag detected",

"Rising wedge forming",

"No clear pattern",

"Breakout structure developing"

]

document.getElementById("pattern").innerText=
p[Math.floor(Math.random()*p.length)]

}

function updatePower(){

let buyer=55+Math.random()*30
let seller=100-buyer

document.getElementById("power").style.width=buyer+"%"

if(buyer>seller){

document.getElementById("powerText").innerText="Buyers dominate higher timeframe"

}else{

document.getElementById("powerText").innerText="Sellers dominate higher timeframe"

}

}

generateTrade()

</script>

</body>

</html>
