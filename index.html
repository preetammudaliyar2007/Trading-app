<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Crypto Analyzer</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#081b33;
color:white;
}

header{
background:#051426;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

select{
padding:6px;
font-size:16px;
}

#chart{
width:100%;
height:50vh;
}

.panel{
padding:10px;
}

.box{
background:#061a31;
padding:10px;
margin-top:10px;
border-radius:6px;
}

h3{
color:#00ff9c;
margin:5px 0;
}

.barBox{
display:flex;
height:20px;
background:#222;
margin-top:6px;
}

#buybar{
background:#00ff9c;
width:50%;
}

#sellbar{
background:#ff4040;
width:50%;
}

.result{
font-size:22px;
text-align:center;
margin-top:8px;
}

footer{
text-align:center;
padding:10px;
font-size:12px;
opacity:0.7;
}

/* Landscape full screen */

@media (orientation: landscape){

#chart{
height:100vh;
}

}

</style>
</head>

<body>

<header>

<select id="coinSelect">

<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="SOLUSDT">SOL</option>
<option value="BNBUSDT">BNB</option>
<option value="XRPUSDT">XRP</option>
<option value="ADAUSDT">ADA</option>
<option value="DOGEUSDT">DOGE</option>

</select>

<div>AI Crypto Analyzer</div>

</header>

<div id="chart"></div>

<div class="panel">

<div class="box">

<h3>AI Trade</h3>

Entry: <span id="entry">-</span><br>
TP: <span id="tp">-</span><br>
SL: <span id="sl">-</span>

<div class="result" id="result"></div>

</div>

<div class="box">

<h3>Demand / Supply</h3>

Demand: <span id="demand"></span><br>
Supply: <span id="supply"></span>

</div>

<div class="box">

<h3>Buyer / Seller Power</h3>

<div class="barBox">
<div id="buybar"></div>
<div id="sellbar"></div>
</div>

</div>

<div class="box">

<h3>Pattern Detection</h3>

<div id="pattern">Scanning market...</div>

</div>

<div class="box">

<h3>Key Level Activity</h3>

<div id="leveltest">Waiting...</div>

</div>

<div class="box">

Win Rate: <span id="winrate">0%</span>

</div>

</div>

<footer>

Powered by Preetam Mudaliyar  
<br>
Sourced by ChatGPT

</footer>

<script>

let symbol="BTCUSDT"

let entry=0
let tp=0
let sl=0
let position=""

let wins=0
let losses=0

/* Coin selector */

document.getElementById("coinSelect").onchange=function(){

symbol=this.value
loadChart()

}

/* Load chart */

function loadChart(){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",
symbol:"BINANCE:"+symbol,
interval:"5",
theme:"dark",
style:"1",
locale:"en",
toolbar_bg:"#081b33",
enable_publishing:false,
allow_symbol_change:false,
hide_side_toolbar:false

})

}

loadChart()

/* Get price */

async function getPrice(){

let r=await fetch(
"https://api.binance.com/api/v3/ticker/price?symbol="+symbol
)

let d=await r.json()

return parseFloat(d.price)

}

/* AI trade */

async function generateTrade(){

let price=await getPrice()

let move=price*0.003

let dir=Math.random()>0.5?"BUY":"SELL"

entry=price

if(dir==="BUY"){

tp=price+move
sl=price-move

}else{

tp=price-move
sl=price+move

}

position=dir

document.getElementById("entry").innerText=entry.toFixed(2)
document.getElementById("tp").innerText=tp.toFixed(2)
document.getElementById("sl").innerText=sl.toFixed(2)

document.getElementById("result").innerText=""

}

/* Trade check */

async function checkTrade(){

if(entry===0) return

let price=await getPrice()

if(position==="BUY"){

if(price>=tp){ wins++; showTP() }

if(price<=sl){ losses++; showSL() }

}else{

if(price<=tp){ wins++; showTP() }

if(price>=sl){ losses++; showSL() }

}

updateWinrate()

}

function showTP(){

document.getElementById("result").innerText="👍 TP HIT"

entry=0

setTimeout(generateTrade,3000)

}

function showSL(){

document.getElementById("result").innerText="💀 SL HIT"

entry=0

setTimeout(generateTrade,3000)

}

function updateWinrate(){

let total=wins+losses

if(total===0) return

let rate=(wins/total*100).toFixed(1)

document.getElementById("winrate").innerText=rate+"%"

}

/* Demand supply */

async function updateZones(){

let price=await getPrice()

let demand=price-(price*0.01)
let supply=price+(price*0.01)

document.getElementById("demand").innerText=demand.toFixed(2)
document.getElementById("supply").innerText=supply.toFixed(2)

}

/* Buyer seller power */

async function updatePower(){

let r=await fetch(
"https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval=15m&limit=20"
)

let d=await r.json()

let first=parseFloat(d[0][4])
let last=parseFloat(d[19][4])

let buy
let sell

if(last>first){

buy=70+Math.random()*10
sell=100-buy

}else{

sell=70+Math.random()*10
buy=100-sell

}

document.getElementById("buybar").style.width=buy+"%"
document.getElementById("sellbar").style.width=sell+"%"

}

/* Pattern detection */

async function detectPattern(){

let r=await fetch(
"https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval=5m&limit=40"
)

let d=await r.json()

let highs=[]
let lows=[]

for(let i=0;i<d.length;i++){

highs.push(parseFloat(d[i][2]))
lows.push(parseFloat(d[i][3]))

}

let highTrend=highs[highs.length-1]-highs[0]
let lowTrend=lows[lows.length-1]-lows[0]

let pattern="No clear pattern"

if(highTrend<0 && lowTrend>0){

pattern="Symmetrical Triangle forming (5m)"

}

if(highTrend>0 && lowTrend>0){

pattern="Bullish Flag forming"

}

if(highTrend<0 && lowTrend<0){

pattern="Bearish Flag forming"

}

document.getElementById("pattern").innerText=pattern

}

/* LEVEL TEST near price */

async function detectLevel(){

let price=await getPrice()

let r=await fetch(
"https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval=15m&limit=80"
)

let data=await r.json()

let levels={}

for(let i=0;i<data.length;i++){

let close=parseFloat(data[i][4])

if(Math.abs(close-price) < price*0.01){

let rounded=Math.round(close)

levels[rounded]=(levels[rounded]||0)+1

}

}

let strongest=null
let tests=0

for(let level in levels){

if(levels[level]>tests){

tests=levels[level]
strongest=level

}

}

if(tests>=3){

document.getElementById("leveltest").innerText=
"Level "+strongest+" tested "+tests+" times near market (15m traders active)"

}else{

document.getElementById("leveltest").innerText="No strong nearby level"

}

}

/* intervals */

generateTrade()

setInterval(checkTrade,4000)
setInterval(updateZones,15000)
setInterval(updatePower,30000)
setInterval(detectPattern,20000)
setInterval(detectLevel,25000)

</script>

</body>
</html>
