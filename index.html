<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preetam Smart Crypto Terminal</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:2px solid #39ff14;
background:black;
color:#39ff14;
}

/* MAIN LAYOUT */

.container{
display:flex;
height:92vh;
}

/* BIG CHART */

.chart{
flex:3;
padding:5px;
}

/* ANALYSIS PANEL */

.side{
flex:1;
border-left:2px solid #39ff14;
padding:10px;
overflow:auto;
}

/* PANELS */

.panel{
border:1px solid #39ff14;
padding:10px;
margin-bottom:10px;
}

.title{
color:#39ff14;
font-weight:bold;
margin-bottom:5px;
}

/* COIN SELECT */

select{
background:black;
color:#39ff14;
border:1px solid #39ff14;
padding:5px;
}

</style>

</head>

<body>

<div class="header">

<div>⚡ Preetam Smart Terminal</div>

<div>

<select id="coinSelect"></select>

</div>

</div>

<div class="container">

<div class="chart">
<div id="chart"></div>
</div>

<div class="side">

<div class="panel">
<div class="title">AI Trade Signal</div>
<div id="tradeSignal">Scanning...</div>
</div>

<div class="panel">
<div class="title">Demand / Supply</div>
<div id="zones">Scanning zones...</div>
</div>

<div class="panel">
<div class="title">Liquidity Sweep</div>
<div id="liquidity">Checking liquidity...</div>
</div>

<div class="panel">
<div class="title">Whale Activity</div>
<div id="whales">Watching whales...</div>
</div>

<div class="panel">
<div class="title">Liquidation Map</div>
<div id="liquidations">Monitoring liquidations...</div>
</div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* COIN LIST (50+) */

const coins=[
"BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT",
"ADAUSDT","AVAXUSDT","DOTUSDT","LINKUSDT","LTCUSDT",
"MATICUSDT","ATOMUSDT","NEARUSDT","APTUSDT","SUIUSDT",
"FTMUSDT","TRXUSDT","ARBUSDT","OPUSDT"
];

const select=document.getElementById("coinSelect");

coins.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.text=c.replace("USDT","");
select.appendChild(o);
});

let coin="BTCUSDT";

select.onchange=()=>{
coin=select.value;
loadChart();
};

/* BIG CHART */

function loadChart(){

document.getElementById("chart").innerHTML="";

new TradingView.widget({

width:"100%",
height:750,

symbol:"BINANCE:"+coin,
interval:"15",
theme:"dark",
style:"1",

hide_side_toolbar:false,

studies:[], /* removes RSI MACD */

container_id:"chart"

});

}

loadChart();

/* FETCH MARKET DATA */

async function getData(){

let r=await fetch(
"https://api.binance.com/api/v3/klines?symbol="+coin+"&interval=15m&limit=100"
);

return await r.json();

}

/* DEMAND SUPPLY */

function detectZones(data){

let demand=[];
let supply=[];

for(let i=2;i<data.length;i++){

let low=parseFloat(data[i][3]);
let high=parseFloat(data[i][2]);

let prevLow=parseFloat(data[i-1][3]);
let prevHigh=parseFloat(data[i-1][2]);

if(low<prevLow) demand.push(low);
if(high>prevHigh) supply.push(high);

}

return {demand,supply};

}

/* BREAKOUT */

function breakout(data){

let last=parseFloat(data[data.length-1][4]);
let prevHigh=parseFloat(data[data.length-2][2]);
let prevLow=parseFloat(data[data.length-2][3]);

if(last>prevHigh) return "Bullish Breakout";
if(last<prevLow) return "Bearish Breakout";

return "No Breakout";

}

/* SMART MONEY TRADE */

function tradeSignal(data){

let last=parseFloat(data[data.length-1][4]);
let prev=parseFloat(data[data.length-5][4]);

let entry=last;
let sl=entry*0.98;
let tp=entry*1.04;

if(last>prev){

return "LONG<br>Entry: "+entry.toFixed(2)+
"<br>SL: "+sl.toFixed(2)+
"<br>TP: "+tp.toFixed(2);

}

return "WAIT";

}

/* LIQUIDITY */

function liquidity(data){

let lastHigh=data[data.length-1][2];
let prevHigh=data[data.length-2][2];

if(lastHigh>prevHigh) return "Liquidity sweep above highs";

return "No sweep";

}

/* WHALE SIMULATION */

function whales(){

const msgs=[
"Large wallet accumulation",
"Possible whale sell wall",
"Exchange inflow detected",
"Stable accumulation"
];

return msgs[Math.floor(Math.random()*msgs.length)];

}

/* LIQUIDATION SIMULATION */

function liquidations(){

const msgs=[
"Short liquidations increasing",
"Long liquidations cluster",
"Liquidation wall detected"
];

return msgs[Math.floor(Math.random()*msgs.length)];

}

/* RUN AI */

async function runAI(){

let data=await getData();

let z=detectZones(data);

document.getElementById("zones").innerHTML=

"Demand zones: "+z.demand.length+
"<br>Supply zones: "+z.supply.length;

document.getElementById("tradeSignal").innerHTML=
tradeSignal(data);

document.getElementById("liquidity").innerHTML=
liquidity(data);

document.getElementById("whales").innerHTML=
whales();

document.getElementById("liquidations").innerHTML=
liquidations();

}

setInterval(runAI,15000);

</script>

</body>
</html>
