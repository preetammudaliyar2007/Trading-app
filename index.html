<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preetam Smart Crypto Terminal</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:2px solid #39ff14;
color:#39ff14;
background:black;
}

/* MAIN LAYOUT */

.container{
display:flex;
height:92vh;
}

/* CHART */

.chart{
flex:4;
padding:5px;
}

/* SIDE PANEL */

.side{
flex:1;
border-left:2px solid #39ff14;
padding:10px;
overflow:auto;
background:#050505;
}

/* PANELS */

.panel{
border:1px solid #39ff14;
padding:10px;
margin-bottom:10px;
}

.title{
color:#39ff14;
font-weight:bold;
margin-bottom:5px;
}

/* SELECT */

select{
background:black;
color:#39ff14;
border:1px solid #39ff14;
padding:5px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:6px;
background:black;
border-top:2px solid #39ff14;
color:#39ff14;
}

</style>
</head>

<body>

<div class="header">

<div>⚡ Preetam Smart Terminal</div>

<div>
<select id="coinSelect"></select>
</div>

</div>

<div class="container">

<div class="chart">
<div id="chart"></div>
</div>

<div class="side">

<div class="panel">
<div class="title">AI Trade Signal</div>
<div id="tradeSignal">Scanning market...</div>
</div>

<div class="panel">
<div class="title">Demand / Supply</div>
<div id="zones">Scanning zones...</div>
</div>

<div class="panel">
<div class="title">Breakout Detection</div>
<div id="breakout">Checking breakout...</div>
</div>

</div>

</div>

<div class="footer">
⚡ Powered by Preetam Mudaliyar ⚡
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* COINS (50+) */

const coins=[
"BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT",
"ADAUSDT","AVAXUSDT","DOTUSDT","LINKUSDT","LTCUSDT",
"MATICUSDT","ATOMUSDT","NEARUSDT","APTUSDT","SUIUSDT",
"FTMUSDT","TRXUSDT","ARBUSDT","OPUSDT","FILUSDT","ETCUSDT",
"AAVEUSDT","ICPUSDT","HBARUSDT","EGLDUSDT","THETAUSDT"
];

const select=document.getElementById("coinSelect");

coins.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.text=c.replace("USDT","");
select.appendChild(o);
});

let coin="BTCUSDT";

select.onchange=()=>{
coin=select.value;
loadChart();
};

/* LOAD CHART */

function loadChart(){

document.getElementById("chart").innerHTML="";

new TradingView.widget({

width:"100%",
height:800,

symbol:"BINANCE:"+coin,
interval:"15",
timezone:"Etc/UTC",
theme:"dark",
style:"1",

hide_side_toolbar:false,
allow_symbol_change:true,

studies:[],

container_id:"chart"

});

}

loadChart();

/* FETCH DATA */

async function getData(){

let r=await fetch(
"https://api.binance.com/api/v3/klines?symbol="+coin+"&interval=15m&limit=100"
);

return await r.json();

}

/* DEMAND SUPPLY */

function detectZones(data){

let demand=[];
let supply=[];

for(let i=2;i<data.length;i++){

let low=parseFloat(data[i][3]);
let high=parseFloat(data[i][2]);

let prevLow=parseFloat(data[i-1][3]);
let prevHigh=parseFloat(data[i-1][2]);

if(low<prevLow) demand.push(low);
if(high>prevHigh) supply.push(high);

}

return {demand,supply};

}

/* BREAKOUT */

function breakout(data){

let last=parseFloat(data[data.length-1][4]);
let prevHigh=parseFloat(data[data.length-2][2]);
let prevLow=parseFloat(data[data.length-2][3]);

if(last>prevHigh) return "Bullish Breakout";

if(last<prevLow) return "Bearish Breakout";

return "No breakout";

}

/* TRADE SIGNAL */

function tradeSignal(data){

let last=parseFloat(data[data.length-1][4]);
let prev=parseFloat(data[data.length-5][4]);

let entry=last;
let sl=entry*0.98;
let tp=entry*1.04;

if(last>prev){

return "LONG<br>Entry: "+entry.toFixed(2)+
"<br>Stop Loss: "+sl.toFixed(2)+
"<br>Target: "+tp.toFixed(2);

}

return "WAIT";

}

/* RUN AI */

async function runAI(){

let data=await getData();

let z=detectZones(data);

document.getElementById("zones").innerHTML=
"Demand zones: "+z.demand.length+
"<br>Supply zones: "+z.supply.length;

document.getElementById("tradeSignal").innerHTML=
tradeSignal(data);

document.getElementById("breakout").innerHTML=
breakout(data);

}

setInterval(runAI,15000);

</script>

</body>
  </html>
