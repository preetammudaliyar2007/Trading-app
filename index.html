<!DOCTYPE html>
<html>
<head>
<title>My Trading App</title>
<script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<h2>Live Trading Chart</h2>

<div id="chart"></div>

<script>
new TradingView.widget({
  "container_id": "chart",
  "width": "100%",
  "height": 600,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "5",
  "timezone": "Asia/Kolkata",
  "theme": "dark",
  "style": "1",
  "locale": "en"
});
</script>

</body>
</html>
