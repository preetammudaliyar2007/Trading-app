<!DOCTYPE html>
<html>
<head>

<title>AI Trading Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:#0b1d3a;
color:white;
font-family:Arial;
overflow:hidden;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
background:#08142a;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.chartBox{
width:60%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

canvas{
width:95% !important;
height:55% !important;
}

.info{
width:40%;
padding:15px;
overflow:auto;
}

.box{
background:#112a52;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.power{
display:flex;
height:18px;
background:#333;
border-radius:6px;
overflow:hidden;
}

.buy{
background:#00ff88;
}

.sell{
background:#ff3b3b;
}

.trade{
font-size:18px;
margin-top:8px;
}

.tp{
color:#00ff88;
font-size:20px;
}

.sl{
color:#ff3b3b;
font-size:20px;
}

</style>
</head>

<body>

<header>AI Crypto Trading Dashboard</header>

<div class="container">

<div class="chartBox">

<canvas id="chart"></canvas>

</div>

<div class="info">

<div class="box">
<h3>AI Trade</h3>
<div id="trade">Waiting trade...</div>
</div>

<div class="box">
<h3>Winning Rate</h3>
<div id="winrate">0%</div>
</div>

<div class="box">
<h3>Buyer / Seller Power</h3>

<div class="power">
<div id="buy" class="buy"></div>
<div id="sell" class="sell"></div>
</div>

</div>

<div class="box">
<h3>Support / Resistance</h3>
<div id="levels"></div>
</div>

<div class="box">
<h3>Pattern</h3>
<div id="pattern"></div>
</div>

<div class="box">
<h3>Price Action Analysis</h3>
<div id="analysis"></div>
</div>

<div class="box">
<h3>Trader Recommendation</h3>
<div id="recommend"></div>
</div>

</div>

</div>

<script>

let symbol="BTCUSDT"

let chart

let prices=[]

let trade=null

let wins=0
let losses=0

async function getPrice(){

let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol="+symbol)

let d=await r.json()

return parseFloat(d.price)

}

async function getHistory(){

let r=await fetch("https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval=1m&limit=50")

let d=await r.json()

prices=d.map(x=>parseFloat(x[4]))

draw()

}

function draw(){

if(chart) chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{
type:"line",
data:{
labels:prices.map((_,i)=>i),
datasets:[{
data:prices,
borderColor:"#00e5ff",
borderWidth:2,
pointRadius:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:"white"}}
}
}

})

}

function supportResistance(){

let last=prices[prices.length-1]

let support=(last-150).toFixed(2)
let resistance=(last+150).toFixed(2)

document.getElementById("levels").innerText=
"Support: "+support+" | Resistance: "+resistance

}

function buyerSeller(){

let avg=prices.reduce((a,b)=>a+b)/prices.length
let last=prices[prices.length-1]

let buyPower
let sellPower

if(last>avg){
buyPower=70
sellPower=30
}else{
buyPower=30
sellPower=70
}

document.getElementById("buy").style.width=buyPower+"%"
document.getElementById("sell").style.width=sellPower+"%"

}

function patternDetect(){

let a=prices[prices.length-3]
let b=prices[prices.length-2]
let c=prices[prices.length-1]

let text="No clear pattern"

if(a<b && b<c) text="Bullish continuation"

if(a>b && b>c) text="Bearish continuation"

document.getElementById("pattern").innerText=text

}

function analysis(){

let first=prices[0]
let last=prices[prices.length-1]

let text="Sideways market"

if(last>first){
text="Market bullish. Buyers controlling structure."
}

if(last<first){
text="Market bearish. Sellers dominating."
}

document.getElementById("analysis").innerText=text

}

function recommendation(){

let last=prices[prices.length-1]
let avg=prices.reduce((a,b)=>a+b)/prices.length

let text="Wait for setup"

if(last>avg){
text="Recommended BUY — price holding above support."
}

if(last<avg){
text="Recommended SELL — price near resistance."
}

document.getElementById("recommend").innerText=text

}

function generateTrade(){

if(trade) return

let last=prices[prices.length-1]

let direction=Math.random()>0.5?"BUY":"SELL"

let entry=last

let tp=direction==="BUY"?entry+120:entry-120
let sl=direction==="BUY"?entry-120:entry+120

trade={
direction,
entry,
tp,
sl
}

document.getElementById("trade").innerHTML=

direction+
"<br>Entry: "+entry.toFixed(2)+
"<br>TP: "+tp.toFixed(2)+
"<br>SL: "+sl.toFixed(2)

}

async function checkTrade(){

if(!trade) return

let price=await getPrice()

if(trade.direction==="BUY"){

if(price>=trade.tp){

wins++
finish("tp")

}

if(price<=trade.sl){

losses++
finish("sl")

}

}

if(trade.direction==="SELL"){

if(price<=trade.tp){

wins++
finish("tp")

}

if(price>=trade.sl){

losses++
finish("sl")

}

}

}

function finish(type){

if(type==="tp"){
document.getElementById("trade").innerHTML+="<div class='tp'>TP DONE 👍</div>"
}

if(type==="sl"){
document.getElementById("trade").innerHTML+="<div class='sl'>SL 🦴</div>"
}

trade=null

updateWin()

setTimeout(generateTrade,4000)

}

function updateWin(){

let total=wins+losses

if(total===0) return

let rate=((wins/total)*100).toFixed(1)

document.getElementById("winrate").innerText=rate+"%"

}

async function update(){

let p=await getPrice()

prices.push(p)

if(prices.length>50) prices.shift()

draw()

supportResistance()

buyerSeller()

patternDetect()

analysis()

recommendation()

}

setInterval(update,5000)

setInterval(checkTrade,3000)

setInterval(generateTrade,10000)

getHistory()

</script>

</body>
                                  </html>
