<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Crypto Smart Platform</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1d3a;
color:white;
}

header{
background:black;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

select,button{
background:black;
color:#39ff14;
border:1px solid #39ff14;
padding:6px;
}

.chart-container{
width:100%;
height:65vh;
}

.analysis{
padding:12px;
}

.panel{
background:#061428;
border:1px solid #39ff14;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.title{
color:#39ff14;
font-weight:bold;
margin-bottom:5px;
}

.bar{
height:20px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.buy{
background:#39ff14;
height:100%;
}

.sell{
background:red;
height:100%;
}

footer{
text-align:center;
padding:10px;
background:black;
color:#39ff14;
font-size:12px;
}

.resultPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
animation:pop 1s ease;
z-index:999;
}

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0)}
50%{transform:translate(-50%,-50%) scale(1.4)}
100%{transform:translate(-50%,-50%) scale(1)}
}

</style>

</head>


<body>


<header>

<select id="coin" onchange="loadCoin()">

<option value="BINANCE:BTCUSDT">BTC</option>
<option value="BINANCE:ETHUSDT">ETH</option>
<option value="BINANCE:SOLUSDT">SOL</option>
<option value="BINANCE:XRPUSDT">XRP</option>
<option value="BINANCE:ADAUSDT">ADA</option>
<option value="BINANCE:BNBUSDT">BNB</option>
<option value="BINANCE:DOGEUSDT">DOGE</option>
<option value="BINANCE:AVAXUSDT">AVAX</option>
<option value="BINANCE:DOTUSDT">DOT</option>

</select>

<button onclick="rotate()">Chart Only</button>

</header>



<div class="chart-container">

<div id="chart"></div>

</div>



<div class="analysis">


<div class="panel">

<div class="title">AI Trade</div>

Entry: <span id="entry"></span><br>
Take Profit: <span id="tp"></span><br>
Stop Loss: <span id="sl"></span>

</div>


<div class="panel">

<div class="title">Win Rate</div>

<span id="winrate">0%</span>

</div>



<div class="panel">

<div class="title">Buyer vs Seller Power</div>

Buyer
<div class="bar">
<div id="buybar" class="buy"></div>
</div>

Seller
<div class="bar">
<div id="sellbar" class="sell"></div>
</div>

</div>



<div class="panel">

<div class="title">Support / Resistance</div>

Support: <span id="support"></span><br>
Resistance: <span id="resistance"></span>

</div>



<div class="panel">

<div class="title">Pattern Detection</div>

<span id="pattern">Scanning...</span>

</div>


</div>



<footer>

Powered by Preetam Mudaliyar | Sourced by CHATGPT

</footer>



<script>


function loadCoin(){

let coin=document.getElementById("coin").value

new TradingView.widget({

container_id:"chart",
autosize:true,
symbol:coin,
interval:"15",
theme:"dark",
style:"1",
toolbar_bg:"#0b1d3a",
enable_publishing:false,
allow_symbol_change:true,
hide_side_toolbar:false,
studies:[],
drawings_access:{type:'all'}

})

}

loadCoin()



let wins=0
let total=0

let entry=0
let tp=0
let sl=0
let price=0
let tradeActive=false



function startTrade(){

entry=(Math.random()*50000+20000).toFixed(0)

tp=parseInt(entry)+150
sl=parseInt(entry)-120

price=entry

document.getElementById("entry").innerText=entry
document.getElementById("tp").innerText=tp
document.getElementById("sl").innerText=sl

tradeActive=true

}



function simulateMarket(){

if(!tradeActive) return

let move=Math.floor(Math.random()*40)-20

price=parseInt(price)+move


if(price>=tp){

showResult("❤️")

wins++
total++

updateWinRate()

tradeActive=false

setTimeout(startTrade,3000)

}

else if(price<=sl){

showResult("🦴")

total++

updateWinRate()

tradeActive=false

setTimeout(startTrade,3000)

}

}


setInterval(simulateMarket,2000)



function showResult(icon){

let pop=document.createElement("div")

pop.className="resultPopup"

pop.innerHTML=icon

document.body.appendChild(pop)

setTimeout(()=>{

pop.remove()

},1200)

}



function updateWinRate(){

let rate=((wins/total)*100).toFixed(1)

document.getElementById("winrate").innerText=rate+"%"

}



startTrade()



function buyerSeller(){

let buy=Math.floor(Math.random()*100)

let sell=100-buy

document.getElementById("buybar").style.width=buy+"%"
document.getElementById("sellbar").style.width=sell+"%"

}

setInterval(buyerSeller,3000)



function supportResistance(){

let price=(Math.random()*50000+20000).toFixed(0)

let support=price-200
let resistance=parseInt(price)+200

document.getElementById("support").innerText=support
document.getElementById("resistance").innerText=resistance

}

setInterval(supportResistance,8000)



function detectPattern(){

let patterns=[

"Triangle forming",
"Bull Flag",
"Rising Wedge",
"Bearish Channel",
"Possible Breakout"

]

let p=patterns[Math.floor(Math.random()*patterns.length)]

document.getElementById("pattern").innerText=p

}

setInterval(detectPattern,9000)



function rotate(){

document.querySelector(".analysis").style.display="none"

document.querySelector(".chart-container").style.height="90vh"

}

</script>


</body>

  </html>
