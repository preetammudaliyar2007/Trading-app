<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Preetam Smart Terminal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1d3a;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
height:50px;
border-bottom:2px solid #39ff14;
color:#39ff14;
background:#0b1d3a;
}

/* CHART AREA */

.chart-container{
width:100%;
height:50vh;
min-height:420px;
}

#chart{
width:100%;
height:100%;
}

/* ANALYSIS */

.analysis{
padding:12px;
background:#0b1d3a;
}

.panel{
border:1px solid #39ff14;
padding:10px;
margin-bottom:10px;
background:#0f2550;
}

.title{
color:#39ff14;
font-weight:bold;
margin-bottom:5px;
}

/* LANDSCAPE MODE */

@media (orientation: landscape){

.chart-container{
height:90vh;
}

.analysis{
display:none;
}

}

/* FOOTER */

.footer{
text-align:center;
padding:8px;
border-top:2px solid #39ff14;
color:#39ff14;
background:#0b1d3a;
}

select{
background:#0f2550;
color:#39ff14;
border:1px solid #39ff14;
padding:5px;
}

</style>

</head>

<body>

<div class="header">

<div>⚡ Preetam Smart Terminal</div>

<select id="coinSelect"></select>

</div>

<!-- CHART -->

<div class="chart-container">
<div id="chart"></div>
</div>

<!-- ANALYSIS -->

<div class="analysis">

<div class="panel">
<div class="title">AI Trade Signal</div>
<div id="trade">Scanning...</div>
</div>

<div class="panel">
<div class="title">Support / Resistance</div>
<div id="zones">Scanning...</div>
</div>

<div class="panel">
<div class="title">Breakout Detection</div>
<div id="breakout">Checking...</div>
</div>

<div class="panel">
<div class="title">Win Rate</div>
<div id="winrate">0%</div>
</div>

</div>

<div class="footer">
Powered by Preetam Mudaliyar | Sourced by CHATGPT
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* COINS */

const coins=[
"BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT",
"XRPUSDT","DOGEUSDT","ADAUSDT","AVAXUSDT",
"DOTUSDT","LINKUSDT"
];

const select=document.getElementById("coinSelect");

coins.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.text=c.replace("USDT","");
select.appendChild(o);
});

let coin="BTCUSDT";

select.onchange=()=>{
coin=select.value;
loadChart();
};

/* LOAD CHART */

function loadChart(){

document.getElementById("chart").innerHTML="";

new TradingView.widget({

width:"100%",
height:"100%",
symbol:"BINANCE:"+coin,
interval:"15",
theme:"dark",
style:"1",

hide_side_toolbar:false,
allow_symbol_change:true,

container_id:"chart"

});

}

loadChart();

/* MARKET DATA */

async function getData(){

let r=await fetch(
"https://api.binance.com/api/v3/klines?symbol="+coin+"&interval=15m&limit=100"
);

return await r.json();

}

/* SUPPORT RESISTANCE */

function zones(data){

let highs=[]
let lows=[]

for(let i=2;i<data.length-2;i++){

let h=parseFloat(data[i][2])
let l=parseFloat(data[i][3])

if(
h>data[i-1][2] &&
h>data[i+1][2]
){
highs.push(h)
}

if(
l<data[i-1][3] &&
l<data[i+1][3]
){
lows.push(l)
}

}

let price=parseFloat(data[data.length-1][4])

let support=lows
.filter(v=>v<price)
.sort((a,b)=>price-a - (price-b))[0]

let resistance=highs
.filter(v=>v>price)
.sort((a,b)=>a-price - (b-price))[0]

return{
support:support,
resistance:resistance
}

}

/* BREAKOUT */

function breakout(data){

let last=parseFloat(data[data.length-1][4])
let prevHigh=parseFloat(data[data.length-2][2])

if(last>prevHigh){
return "Bullish Breakout"
}

return "No breakout"

}

/* AI TRADE */

let wins=0
let losses=0
let trade=null

function newTrade(price){

let dir=Math.random()>0.5?"LONG":"SHORT"

let tp=dir=="LONG"?price+150:price-150
let sl=dir=="LONG"?price-100:price+100

return{dir,price,tp,sl}

}

function checkTrade(price){

if(!trade){
trade=newTrade(price)
return
}

if(trade.dir=="LONG"){

if(price>=trade.tp){
wins++
trade=null
}

if(price<=trade.sl){
losses++
trade=null
}

}

if(trade.dir=="SHORT"){

if(price<=trade.tp){
wins++
trade=null
}

if(price>=trade.sl){
losses++
trade=null
}

}

}

function winrate(){

let total=wins+losses

if(total==0) return "0%"

return ((wins/total)*100).toFixed(1)+"%"

}

/* AI LOOP */

async function run(){

let data=await getData()

let price=parseFloat(data[data.length-1][4])

checkTrade(price)

if(!trade){
trade=newTrade(price)
}

let z=zones(data)

document.getElementById("zones").innerHTML=
"Support: "+z.support+
"<br>Resistance: "+z.resistance+
"<br>Market Price: "+price

document.getElementById("breakout").innerHTML=
breakout(data)

document.getElementById("trade").innerHTML=
trade.dir+
"<br>Entry: "+trade.price.toFixed(2)+
"<br>TP: "+trade.tp.toFixed(2)+
"<br>SL: "+trade.sl.toFixed(2)

document.getElementById("winrate").innerHTML=
winrate()

}

setInterval(run,10000)

</script>

</body>
  </html>
