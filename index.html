<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preetam Smart Crypto Terminal</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:2px solid #39ff14;
color:#39ff14;
}

/* CHART FULL WIDTH */

.chart-container{
width:100%;
height:80vh;
}

#chart{
width:100%;
height:100%;
}

/* ANALYSIS BELOW CHART */

.analysis{
padding:15px;
border-top:2px solid #39ff14;
}

.panel{
border:1px solid #39ff14;
padding:10px;
margin-bottom:10px;
}

.title{
color:#39ff14;
font-weight:bold;
margin-bottom:5px;
}

select{
background:black;
color:#39ff14;
border:1px solid #39ff14;
padding:5px;
}

/* FOOTER */

.footer{
text-align:center;
padding:6px;
border-top:2px solid #39ff14;
color:#39ff14;
}

</style>

</head>

<body>

<div class="header">

<div>⚡ Preetam Smart Terminal</div>

<select id="coinSelect"></select>

</div>

<!-- CHART -->

<div class="chart-container">
<div id="chart"></div>
</div>

<!-- ANALYSIS BELOW -->

<div class="analysis">

<div class="panel">
<div class="title">AI Trade Signal</div>
<div id="tradeSignal">Scanning...</div>
</div>

<div class="panel">
<div class="title">Demand / Supply</div>
<div id="zones">Scanning...</div>
</div>

<div class="panel">
<div class="title">Breakout Detection</div>
<div id="breakout">Checking...</div>
</div>

<div class="panel">
<div class="title">Win Rate</div>
<div id="winrate">0%</div>
</div>

</div>

<div class="footer">
⚡ Powered by Preetam Mudaliyar | Sourced by ChatGPT ⚡
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* COINS */

const coins=[
"BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT",
"DOGEUSDT","ADAUSDT","AVAXUSDT","DOTUSDT","LINKUSDT"
];

const select=document.getElementById("coinSelect");

coins.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.text=c.replace("USDT","");
select.appendChild(o);
});

let coin="BTCUSDT";

select.onchange=()=>{
coin=select.value;
loadChart();
};

/* CHART */

function loadChart(){

document.getElementById("chart").innerHTML="";

new TradingView.widget({

width:"100%",
height:"100%",

symbol:"BINANCE:"+coin,
interval:"15",
theme:"dark",
style:"1",

hide_side_toolbar:false,
allow_symbol_change:true,

studies:[],

container_id:"chart"

});

}

loadChart();

/* DATA */

async function getData(){

let r=await fetch(
"https://api.binance.com/api/v3/klines?symbol="+coin+"&interval=15m&limit=100"
);

return await r.json();

}

/* DEMAND SUPPLY */

function detectZones(data){

let demand=0;
let supply=0;

for(let i=2;i<data.length;i++){

let low=data[i][3];
let high=data[i][2];

let prevLow=data[i-1][3];
let prevHigh=data[i-1][2];

if(low<prevLow) demand++;
if(high>prevHigh) supply++;

}

return {demand,supply};

}

/* BREAKOUT */

function breakout(data){

let last=data[data.length-1][4];
let prevHigh=data[data.length-2][2];
let prevLow=data[data.length-2][3];

if(last>prevHigh) return "Bullish Breakout";
if(last<prevLow) return "Bearish Breakout";

return "No breakout";

}

/* AI TRADE SYSTEM */

let wins=0;
let losses=0;

function generateTrade(price){

let direction=Math.random()>0.5?"LONG":"SHORT";

let entry=price;

let tp=direction=="LONG"
? entry+150
: entry-150;

let sl=direction=="LONG"
? entry-100
: entry+100;

return {direction,entry,tp,sl};

}

let currentTrade=null;

function evaluateTrade(price){

if(!currentTrade){
currentTrade=generateTrade(price);
return;
}

if(currentTrade.direction=="LONG"){

if(price>=currentTrade.tp){
wins++;
currentTrade=null;
}

if(price<=currentTrade.sl){
losses++;
currentTrade=null;
}

}

if(currentTrade.direction=="SHORT"){

if(price<=currentTrade.tp){
wins++;
currentTrade=null;
}

if(price>=currentTrade.sl){
losses++;
currentTrade=null;
}

}

}

function winRate(){

let total=wins+losses;

if(total==0) return "0%";

return ((wins/total)*100).toFixed(1)+"%";

}

/* RUN AI */

async function runAI(){

let data=await getData();

let price=parseFloat(data[data.length-1][4]);

evaluateTrade(price);

if(!currentTrade){
currentTrade=generateTrade(price);
}

let z=detectZones(data);

document.getElementById("zones").innerHTML=
"Demand zones: "+z.demand+
"<br>Supply zones: "+z.supply;

document.getElementById("breakout").innerHTML=
breakout(data);

document.getElementById("tradeSignal").innerHTML=

currentTrade.direction+
"<br>Entry: "+currentTrade.entry.toFixed(2)+
"<br>TP: "+currentTrade.tp.toFixed(2)+
"<br>SL: "+currentTrade.sl.toFixed(2);

document.getElementById("winrate").innerHTML=
winRate();

}

setInterval(runAI,10000);

</script>

</body>
</html>
