<!DOCTYPE html>
<html>

<head>

<title>AI Crypto Scalping Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1d3a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#08142b;
}

#coinInfo{
display:flex;
align-items:center;
gap:10px;
}

#coinLogo{
width:34px;
height:34px;
}

#coinSelect{
padding:8px;
background:#1c3f75;
color:white;
border:none;
border-radius:6px;
}

#chart{
width:100%;
height:60vh;
}

#panel{
padding:20px;
}

.box{
background:#122b55;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.powerBar{
height:12px;
background:#333;
border-radius:6px;
overflow:hidden;
}

#power{
height:100%;
background:lime;
width:50%;
}

</style>

</head>

<body>

<header>

<div id="coinInfo">
<img id="coinLogo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
<h2 id="coinName">BTC/USDT</h2>
</div>

<select id="coinSelect">

<option value="BTCUSDT" data-logo="https://cryptologos.cc/logos/bitcoin-btc-logo.png">BTC</option>
<option value="ETHUSDT" data-logo="https://cryptologos.cc/logos/ethereum-eth-logo.png">ETH</option>
<option value="SOLUSDT" data-logo="https://cryptologos.cc/logos/solana-sol-logo.png">SOL</option>
<option value="BNBUSDT" data-logo="https://cryptologos.cc/logos/bnb-bnb-logo.png">BNB</option>

</select>

</header>

<div id="chart"></div>

<div id="panel">

<div class="box">

<h3>AI Scalping Trade</h3>

Entry: <span id="entry">-</span><br>
TP: <span id="tp">-</span><br>
SL: <span id="sl">-</span><br>
Direction: <span id="direction">-</span>

</div>

<div class="box">

<h3>Market Analysis</h3>
<p id="analysis">Waiting for analysis...</p>

</div>

<div class="box">

<h3>Buyer vs Seller Power</h3>

<div class="powerBar">
<div id="power"></div>
</div>

<p id="powerText"></p>

</div>

</div>

<audio id="coinSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

let symbol="BTCUSDT"

function loadChart(sym){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",

autosize:true,

symbol:"BINANCE:"+sym,

interval:"5",

theme:"dark",

style:"1",

toolbar_bg:"#0b1d3a",

allow_symbol_change:true

})

}

loadChart(symbol)

document.getElementById("coinSelect").addEventListener("change",function(){

symbol=this.value

let logo=this.options[this.selectedIndex].dataset.logo

document.getElementById("coinLogo").src=logo
document.getElementById("coinName").innerText=symbol.replace("USDT","/USDT")

document.getElementById("coinSound").play()

loadChart(symbol)

/* reset old trade */

document.getElementById("entry").innerText="-"
document.getElementById("tp").innerText="-"
document.getElementById("sl").innerText="-"
document.getElementById("direction").innerText="-"

document.getElementById("analysis").innerText=
"Analyzing "+symbol.replace("USDT","")+" market..."

setTimeout(generateTrade,1500)

})

async function generateTrade(){

let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=5m&limit=50`)
let candles=await res.json()

let closes=candles.map(c=>parseFloat(c[4]))
let highs=candles.map(c=>parseFloat(c[2]))
let lows=candles.map(c=>parseFloat(c[3]))

let price=closes[closes.length-1]

let ema=closes.slice(-20).reduce((a,b)=>a+b)/20

let support=Math.min(...lows.slice(-15))
let resistance=Math.max(...highs.slice(-15))

let direction="NONE"

if(price>ema && price<resistance*0.995){
direction="LONG"
}

if(price<ema && price>support*1.005){
direction="SHORT"
}

if(direction=="NONE"){

document.getElementById("analysis").innerText=
`${symbol.replace("USDT","")} market ranging. No scalping trade.`

return

}

let tpDistance=300+Math.random()*200
let slDistance=200

let entry=price
let tp,sl

if(direction=="LONG"){

tp=entry+tpDistance
sl=entry-slDistance

}

if(direction=="SHORT"){

tp=entry-tpDistance
sl=entry+slDistance

}

document.getElementById("entry").innerText=entry.toFixed(2)
document.getElementById("tp").innerText=tp.toFixed(2)
document.getElementById("sl").innerText=sl.toFixed(2)
document.getElementById("direction").innerText=direction

document.getElementById("analysis").innerText=
`${symbol.replace("USDT","")} analysis:

EMA trend confirmed.

Support: ${support.toFixed(2)}

Resistance: ${resistance.toFixed(2)}

Scalping opportunity detected near market price.`

updatePower(direction)

}

function updatePower(direction){

let powerValue

if(direction=="LONG"){

powerValue=70+Math.random()*20
document.getElementById("powerText").innerText="Buyers dominate higher timeframe"

}else{

powerValue=30-Math.random()*20
document.getElementById("powerText").innerText="Sellers dominate higher timeframe"

}

document.getElementById("power").style.width=powerValue+"%"

}

generateTrade()

setInterval(generateTrade,25000)

</script>

</body>
</html>
